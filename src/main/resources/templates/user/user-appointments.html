<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Lịch hẹn của tôi | King Barber</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"/>

<style>

body{
font-family:"Segoe UI",sans-serif;
background:#f4f6fb;
}

/* HERO */

.hero{
background:linear-gradient(135deg,#1976d2,#42a5f5);
border-radius:18px;
padding:24px;
color:#fff;
}

/* CARD */

.card-section{
border-radius:16px;
border:none;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

/* TABLE */

.table tbody tr:hover{
background:#f8f9ff;
}

/* SERVICE BADGE */

.service-badge{

display:inline-flex;
align-items:center;
gap:5px;

background:#e3f2fd;
color:#1565c0;

padding:5px 12px;
margin:2px;

border-radius:20px;

font-size:13px;
font-weight:500;

border:1px solid #bbdefb;

box-shadow:0 2px 5px rgba(0,0,0,0.08);

transition:all 0.2s ease;

}

.service-badge:hover{
background:#1565c0;
color:#fff;
transform:scale(1.05);
}

.service-badge i{
font-size:11px;
}

/* BUTTON */

.btn-primary{
border-radius:8px;
}

.btn-danger{
border-radius:8px;
}

</style>

</head>

<body>

<div th:replace="fragments/navbar-user :: navbarUser('appointments')"></div>

<div class="container py-4">

<!-- HERO -->

<div class="hero text-center mb-4">

<h4 class="mb-2">
<i class="fa-solid fa-calendar-check"></i>
Lịch hẹn của bạn
</h4>

<p class="mb-0">
Quản lý các lịch đã đặt tại King Barber
</p>

<div class="mt-3">

<a th:href="@{/user/lichhen/add}"
class="btn btn-light btn-sm">

<i class="fa fa-plus"></i>
Tạo lịch hẹn

</a>

</div>

</div>

<!-- MESSAGE -->

<div th:if="${successMsg}" class="alert alert-success"
th:text="${successMsg}"></div>

<div th:if="${errorMsg}" class="alert alert-danger"
th:text="${errorMsg}"></div>

<!-- TABLE CARD -->

<div class="card card-section">

<div class="card-header bg-white">
<b>Danh sách lịch hẹn</b>
</div>

<div class="card-body p-0">

<table class="table mb-0 align-middle">

<thead class="table-light">

<tr>
<th>Mã</th>
<th>Ngày</th>
<th>Giờ</th>
<th>Nhân viên</th>
<th>Dịch vụ</th>
<th>Thao tác</th>
</tr>

</thead>

<tbody>

<tr th:each="lh : ${listLichHen}">

<td>
<span class="badge bg-secondary"
th:text="${lh.maLh}"></span>
</td>

<td th:text="${#temporals.format(lh.ngayHen,'dd/MM/yyyy')}"></td>

<td th:text="${#temporals.format(lh.gioHen,'HH:mm')}"></td>

<td>

<span th:if="${lh.nhanVien != null}">
<i class="fa fa-user"></i>
<span th:text="${lh.nhanVien.hoTen}"></span>
</span>

<span th:if="${lh.nhanVien == null}" class="text-muted">
---
</span>

</td>

<!-- SERVICES -->

<td>

<span th:each="dv : ${mapDichVu[lh.maLh]}"
class="service-badge">

<i class="fa-solid fa-scissors"></i>

<span th:text="${dv.tenDv}"></span>

</span>

<span th:if="${#lists.isEmpty(mapDichVu[lh.maLh])}"
class="text-muted">

Chưa chọn

</span>

</td>

<!-- ACTION -->

<td>

<a class="btn btn-sm btn-primary"
th:href="@{/user/lichhen/edit/{id}(id=${lh.maLh})}">

<i class="fa fa-pen"></i>
Sửa

</a>

<a class="btn btn-sm btn-danger"
th:href="@{'/user/lichhen/delete/'+${lh.maLh}}"
onclick="return confirm('Bạn chắc chắn muốn xóa lịch này?')">

<i class="fa fa-trash"></i>
Xóa

</a>

</td>

</tr>

<tr th:if="${#lists.isEmpty(listLichHen)}">

<td colspan="6" class="text-center text-muted py-4">

<i class="fa fa-calendar-xmark"></i>
Bạn chưa có lịch hẹn

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
