<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary"
     th:fragment="navbarUser(activePage)">

    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand fw-bold" th:href="@{/user/home}">
            <i class="fa-solid fa-scissors me-2"></i>
            King Barber
        </a>

        <!-- Toggle mobile -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarUserMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarUserMenu">

            <!-- MENU -->
            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/user/home}"
                       th:classappend="${activePage == 'home'} ? ' active fw-bold'">
                        <i class="fa-solid fa-house me-1"></i>
                        Trang chủ
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/user/lichhen}"
                       th:classappend="${activePage == 'appointments'} ? ' active fw-bold'">
                        <i class="fa-regular fa-calendar me-1"></i>
                        Lịch hẹn
                    </a>
                </li>

            </ul>

            <!-- USER -->
            <ul class="navbar-nav">

                <li class="nav-item dropdown" th:if="${session.user != null}">

                    <a class="nav-link dropdown-toggle"
                       href="#"
                       role="button"
                       data-bs-toggle="dropdown">

                        <i class="fa-regular fa-user me-1"></i>

                        <span th:text="${session.user.username}">
                            Username
                        </span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow">

                        <li>
                            <a class="dropdown-item"
                               th:href="@{/user/profile}">
                                <i class="fa-regular fa-id-badge me-2"></i>
                                Hồ sơ cá nhân
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <a class="dropdown-item text-danger"
                               th:href="@{/logout}">
                                <i class="fa-solid fa-right-from-bracket me-2"></i>
                                Đăng xuất
                            </a>
                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>
</nav>

</body>
</html>
