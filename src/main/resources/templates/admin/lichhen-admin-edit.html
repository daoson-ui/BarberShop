<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Cập nhật Lịch hẹn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"/>

<style>
body{
    font-family:"Segoe UI",sans-serif;
    background:#f4f6fb;
}

.form-card{
    max-width:520px;
    margin:32px auto;
    border-radius:18px;
    border:none;
    box-shadow:0 10px 28px rgba(15,23,42,0.12);
}

.dv-box{
    border-radius:10px;
    max-height:180px;
    overflow-y:auto;
}

.busy{
    background:#ffe0e0;
}

.free{
    background:#e3f2fd;
}
</style>
</head>

<body>

<div class="container"
     th:data-current-time="${lichHen.gioHen}"
     th:data-id="${lichHen.maLh}">

<div class="card form-card">

<div class="card-header bg-primary text-white border-0">
<h5 class="mb-0">
<i class="fa-regular fa-calendar-check me-1"></i>
Cập nhật Lịch hẹn
</h5>

<small class="text-white-50">
Điều chỉnh lại ngày, nhân viên, dịch vụ và khung giờ phù hợp
</small>
</div>

<div class="card-body">

<form th:action="@{/admin/lichhen/edit}" method="post" id="editForm">

<input type="hidden" name="maLh" th:value="${lichHen.maLh}"/>

<!-- NGÀY -->
<div class="mb-3">
<label class="form-label">Ngày hẹn</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-regular fa-calendar"></i>
</span>

<input type="date"
       id="ngayHen"
       name="ngayHen"
       class="form-control"
       th:value="${lichHen.ngayHen}"
       th:attr="min=${#dates.format(#dates.createNow(),'yyyy-MM-dd')}"
       required>

</div>
</div>


<!-- NHÂN VIÊN -->
<div class="mb-3">

<label class="form-label">Nhân viên</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-user-tie"></i>
</span>

<select id="nhanVien"
        name="nhanVien"
        class="form-select"
        required>

<option value="">-- Chọn nhân viên --</option>

<option th:each="nv:${listNhanVien}"
        th:value="${nv.manv}"
        th:text="${nv.hoTen}"
        th:selected="${nv.manv == lichHen.nhanVien.manv}">
</option>

</select>

</div>
</div>


<!-- DỊCH VỤ -->
<div class="mb-3">

<label class="form-label">Dịch vụ</label>

<div class="dv-box border bg-light p-2">

<label class="form-check"
       th:each="dv:${listDichVu}">

<input class="form-check-input dv-check"
       type="checkbox"
       name="dichVuChon"
       th:value="${dv.maDv}"
       th:checked="${selectedDvIds.contains(dv.maDv)}">

<span class="form-check-label">

<span class="fw-semibold"
      th:text="${dv.tenDv}"></span>

</span>

</label>

</div>

<small class="text-muted">
Bạn có thể thay đổi hoặc giữ nguyên dịch vụ đã chọn
</small>

</div>


<!-- GIỜ -->
<div class="mb-3">

<label class="form-label">Giờ hẹn</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-regular fa-clock"></i>
</span>

<select id="gioHen"
        name="gioHen"
        class="form-select"
        disabled
        required>

<option value="">-- Chọn giờ --</option>

</select>

</div>
</div>


<button type="submit" class="btn btn-primary w-100">
<i class="fa-solid fa-floppy-disk me-1"></i>
Cập nhật lịch hẹn
</button>

</form>

<a href="/admin/lichhen" class="btn btn-link mt-3">
← Quay lại
</a>

</div>
</div>
</div>



<script>

const container=document.querySelector('.container');

const currentTime=normalizeTime(container.dataset.currentTime);
const maLh=container.dataset.id;

const ngayInput=document.getElementById('ngayHen');
const nvSelect=document.getElementById('nhanVien');
const gioSelect=document.getElementById('gioHen');

function normalizeTime(t){
    if(!t) return '';
    return t.length>=5 ? t.substring(0,5) : t;
}

function getSelectedServices(){
    return [...document.querySelectorAll('.dv-check:checked')]
           .map(cb=>cb.value);
}

function checkEnableTime(){

    const date=ngayInput.value;
    const manv=nvSelect.value;
    const dvIds=getSelectedServices();

    if(date && manv && dvIds.length>0){

        gioSelect.disabled=false;
        loadTimeSlots();

    }else{

        gioSelect.disabled=true;
        gioSelect.innerHTML='<option value="">-- Chọn giờ --</option>';

    }

}

async function loadTimeSlots(){

    const date=ngayInput.value;
    const manv=nvSelect.value;
    const dvIds=getSelectedServices();

    if(!date || !manv) return;

    gioSelect.innerHTML='<option>Đang tải...</option>';

    let url=`/admin/lichhen/api/timeslots?manv=${manv}&ngay=${date}&excludeId=${maLh}`;

    dvIds.forEach(id=>{
        url+=`&dvIds=${id}`;
    });

    try{

        const res=await fetch(url);
        const data=await res.json();

        gioSelect.innerHTML='<option value="">-- Chọn giờ --</option>';

        data.forEach(slot=>{

            const opt=document.createElement('option');

            opt.value=slot.time;

            if(slot.busy && slot.time!==currentTime){

                opt.textContent=slot.time+' (Bận)';
                opt.disabled=true;
                opt.className='busy';

            }else{

                opt.textContent=slot.time;
                opt.className='free';

            }

            if(slot.time===currentTime){
                opt.selected=true;
            }

            gioSelect.appendChild(opt);

        });

    }catch(e){

        console.error("Load timeslot error",e);
        gioSelect.innerHTML='<option>Lỗi tải giờ</option>';

    }

}


ngayInput.addEventListener('change',checkEnableTime);
nvSelect.addEventListener('change',checkEnableTime);

document.querySelectorAll('.dv-check')
.forEach(cb=>cb.addEventListener('change',checkEnableTime));


window.addEventListener('load',()=>{

    setTimeout(()=>{
        checkEnableTime();
    },100);

});


document.getElementById('editForm')
.addEventListener('submit',function(e){

    const date=ngayInput.value;
    const time=gioSelect.value;

    const dvIds=getSelectedServices();

    if(dvIds.length===0){
        e.preventDefault();
        alert("⚠️ Vui lòng chọn ít nhất 1 dịch vụ");
        return;
    }

    if(!date || !time) return;

    const selected=new Date(date+'T'+time);

    if(selected < new Date()){

        e.preventDefault();
        alert("❌ Không thể chỉnh sửa về quá khứ");

    }

});

</script>

</body>
</html>
