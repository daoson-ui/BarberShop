<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Thêm Lịch hẹn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"/>

<style>

body{
    background:#f4f6fb;
    font-family:"Segoe UI",sans-serif;
}

.form-card{
    max-width:550px;
    margin:40px auto;
    border-radius:18px;
    border:none;
    box-shadow:0 10px 28px rgba(0,0,0,0.1);
}

.dv-box{
    max-height:180px;
    overflow-y:auto;
    border-radius:10px;
}

.slot-busy{
    background:#ffdede;
}

</style>

</head>

<body>

<div class="container">

<div class="card form-card">

<div class="card-header bg-primary text-white">

<h5 class="mb-0">
<i class="fa-regular fa-calendar-plus"></i>
Thêm Lịch hẹn
</h5>

<small class="text-white-50">
Chọn khách, nhân viên và dịch vụ – hệ thống sẽ gợi ý giờ trống
</small>

</div>


<div class="card-body">

<!-- ALERT -->

<div th:if="${errorMsg}"
     id="alertBox"
     class="alert alert-danger alert-dismissible fade show">

<span th:text="${errorMsg}"></span>

<button class="btn-close"
        data-bs-dismiss="alert">
</button>

</div>


<form th:action="@{/admin/lichhen/add}" method="post" id="addForm">

<!-- KHÁCH HÀNG -->

<div class="mb-3">

<label class="form-label">Khách hàng</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-user"></i>
</span>

<select name="makh" class="form-select" required>

<option value="">-- Chọn khách hàng --</option>

<option th:each="kh : ${listKhachHang}"
        th:value="${kh.makh}"
        th:text="${kh.hoTen + ' - ' + kh.sdt}">
</option>

</select>

</div>

</div>


<!-- NGÀY HẸN -->

<div class="mb-3">

<label class="form-label">Ngày hẹn</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-regular fa-calendar"></i>
</span>

<input type="date"
       name="ngayHen"
       id="ngayHen"
       class="form-control"
       required>

</div>

</div>


<!-- NHÂN VIÊN -->

<div class="mb-3">

<label class="form-label">Nhân viên</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-user-tie"></i>
</span>

<select name="manv"
        id="manv"
        class="form-select"
        required>

<option value="">-- Chọn nhân viên --</option>

<option th:each="nv : ${listNhanVien}"
        th:value="${nv.manv}"
        th:text="${nv.hoTen}">
</option>

</select>

</div>

</div>


<!-- DỊCH VỤ -->

<div class="mb-3">

<label class="form-label">Dịch vụ</label>

<div class="dv-box border bg-light p-2">

<div class="form-check"
     th:each="dv : ${listDichVu}">

<input class="form-check-input"
       type="checkbox"
       name="dichVuChon"
       th:value="${dv.maDv}">

<label class="form-check-label">

<span class="fw-semibold"
      th:text="${dv.tenDv}"></span>

<span class="text-muted small">
- <span th:text="${dv.thoiGianThucHien}"></span> phút
</span>

</label>

</div>

</div>

<small class="text-muted">
Có thể chọn nhiều dịch vụ cùng lúc
</small>

</div>


<!-- GIỜ HẸN -->

<div class="mb-3">

<label class="form-label">Giờ hẹn</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-regular fa-clock"></i>
</span>

<select name="gioHen"
        id="gioHen"
        class="form-select"
        required>

<option value="">-- Chọn giờ --</option>

</select>

</div>

</div>


<!-- SUBMIT -->

<button type="submit"
        class="btn btn-primary w-100">

<i class="fa-solid fa-check"></i>
Đặt lịch hẹn

</button>

</form>


<a href="/admin/lichhen"
   class="btn btn-link mt-3">

← Quay lại danh sách

</a>

</div>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script>

document.addEventListener("DOMContentLoaded",function(){

async function loadTimeSlots(){

const ngay = document.getElementById("ngayHen").value;
const manv = document.getElementById("manv").value;

if(!ngay || !manv) return;

let dvIds = [];

document.querySelectorAll("input[name='dichVuChon']:checked")
.forEach(cb => dvIds.push(cb.value));

let url = `/admin/lichhen/api/timeslots?manv=${manv}&ngay=${ngay}`;

dvIds.forEach(id => {
url += `&dvIds=${id}`;
});

try{

const res = await fetch(url);

if(!res.ok){
alert("Không tải được khung giờ!");
return;
}

const data = await res.json();

const select = document.getElementById("gioHen");

select.innerHTML = '<option value="">-- Chọn giờ --</option>';

data.forEach(item => {

const opt = document.createElement("option");

opt.value = item.time;

if(item.busy){

opt.textContent = item.time + " (Bận)";
opt.disabled = true;
opt.classList.add("slot-busy");

}else{

opt.textContent = item.time;

}

select.appendChild(opt);

});

}catch(e){

console.error(e);
alert("Lỗi tải khung giờ");

}

}


document.getElementById("ngayHen")
.addEventListener("change",loadTimeSlots);

document.getElementById("manv")
.addEventListener("change",loadTimeSlots);

document.querySelectorAll("input[name='dichVuChon']")
.forEach(cb => cb.addEventListener("change",loadTimeSlots));


document.getElementById("addForm")
.addEventListener("submit",function(e){

const date = document.getElementById("ngayHen").value;
const time = document.getElementById("gioHen").value;

if(!date || !time) return;

const selected = new Date(date + "T" + time);
const now = new Date();

if(selected < now){

e.preventDefault();
alert("❌ Không thể đặt lịch trong quá khứ!");

}

});


setTimeout(()=>{

const alertBox = document.getElementById("alertBox");

if(alertBox){

alertBox.style.transition="opacity 0.5s";
alertBox.style.opacity="0";

setTimeout(()=>{
alertBox.remove();
},500);

}

},4000);

});

</script>

</body>
</html>
