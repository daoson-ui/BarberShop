```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Chỉnh sửa dịch vụ | Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"/>

<style>

body{
background:#f5f7fb;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.form-card{
max-width:560px;
margin:auto;
margin-top:60px;
border-radius:12px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.page-title{
font-weight:600;
}

.img-preview{
width:140px;
height:100px;
object-fit:cover;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:10px;
}

.btn-update{
background:#1976d2;
border:none;
}

.btn-update:hover{
background:#125aa0;
}

</style>

</head>

<body>

<div class="container">

<div class="card form-card">

<div class="card-header bg-warning">

<h5 class="mb-0 page-title">

<i class="fa-solid fa-pen-to-square me-2"></i>
Chỉnh sửa dịch vụ

</h5>

</div>

<div class="card-body">

<form th:action="@{/admin/dichvu/edit}"
      th:object="${dichVu}"
      method="post"
      enctype="multipart/form-data">

<input type="hidden" th:field="*{maDv}">
<input type="hidden" th:field="*{hinhAnh}">

<div class="mb-3">

<label class="form-label">
Tên dịch vụ
</label>

<input type="text"
class="form-control"
th:field="*{tenDv}"
required>

</div>

<div class="mb-3">

<label class="form-label">
Giá (VND)
</label>

<input type="number"
class="form-control"
th:field="*{gia}"
required>

</div>

<div class="mb-3">

<label class="form-label">
Thời gian thực hiện (phút)
</label>

<input type="number"
class="form-control"
th:field="*{thoiGianThucHien}"
required>

</div>

<div class="mb-3">

<label class="form-label">
Ảnh hiện tại
</label>

<div>

<img th:src="@{'/images/dichvu/' + ${dichVu.hinhAnh}}"
     class="img-preview">

</div>

</div>

<div class="mb-4">

<label class="form-label">
Chọn ảnh mới (nếu muốn thay đổi)
</label>

<input type="file"
class="form-control"
name="file"
accept="image/*">

</div>

<div class="d-flex justify-content-between">

<a href="/admin/dichvu"
class="btn btn-secondary">

<i class="fa-solid fa-arrow-left me-1"></i>
Quay lại

</a>

<button type="submit"
class="btn btn-update text-white">

<i class="fa-solid fa-floppy-disk me-1"></i>
Cập nhật

</button>

</div>

</form>

</div>

</div>

</div>

</body>
</html>
```
