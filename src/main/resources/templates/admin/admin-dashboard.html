<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dashboard | Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />

    <style>
        body {
            background: #f4f6f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .navbar {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .app-shell {
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            background: #1e3c72;
            min-height: calc(100vh - 56px);
            color: #cbd5e1;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .sidebar a i {
            width: 20px;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateX(4px);
        }

        .sidebar a.active {
            background: #2563eb;
            color: #fff;
            font-weight: 600;
        }

        .sidebar hr {
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* ===== CONTENT ===== */
        .content-wrapper {
            padding: 24px;
        }

        .card {
            border-radius: 12px;
            border: none;
        }

        .stat-card {
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
            transition: 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
        }

        .stat-icon {
            font-size: 22px;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
    </style>
</head>

<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-primary" href="/admin/home">
                <i class="fa-solid fa-scissors me-2"></i>BARBERSHOP ADMIN
            </a>

            <div class="ms-auto dropdown">
                <a class="nav-link dropdown-toggle fw-semibold" href="#" role="button"
                    data-bs-toggle="dropdown">
                    <i class="fa-regular fa-user me-1"></i> Admin
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" href="/logout">
                            <i class="fa-solid fa-arrow-right-from-bracket me-1"></i> Đăng xuất
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ===== LAYOUT ===== -->
    <div class="app-shell container-fluid">
        <div class="row">

             <!-- ===== SIDEBAR ===== -->
            <aside class="col-lg-2 col-md-3 sidebar p-3 d-none d-md-block">

                <a href="/admin/home" class="active">
                    <i class="fa-solid fa-house me-2"></i>Trang chủ
                </a>

                <a href="/admin/nhanvien">
                    <i class="fa-solid fa-user-tie me-2"></i>Nhân viên
                </a>

                <a href="/admin/khachhang">
                    <i class="fa-solid fa-users me-2"></i>Khách hàng
                </a>

                <a href="/admin/dichvu">
                    <i class="fa-solid fa-spray-can-sparkles me-2"></i>Dịch vụ
                </a>

                <a href="/admin/lichhen">
                    <i class="fa-solid fa-calendar-check me-2"></i>Lịch hẹn
                </a>

                <a href="/admin/hoadon">
                    <i class="fa-solid fa-receipt me-2"></i>Hóa đơn
                </a>
                
                <a href="/admin/thongke">
                    <i class="fa-solid fa-chart-line me-2"></i>Doanh thu
                </a>

            </aside>

            <!-- ===== CONTENT ===== -->
            <main class="col-lg-10 col-md-9 content-wrapper">

                <div class="mb-4">
                    <h4 class="fw-semibold mb-1">Trang Quản Trị</h4>
                    <p class="text-muted mb-0">
                        Quản lý nhân viên, khách hàng, dịch vụ, lịch hẹn và hóa đơn tại một nơi.
                    </p>
                </div>

                <!-- ===== STATISTICS ===== -->
                <div class="row g-3">

                    <div class="col-md-3">
                        <div class="card stat-card p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted small">Nhân viên</div>
                                    <div class="fw-bold fs-5" th:text="${tongNhanVien} ?: 0">0</div>
                                </div>
                                <div class="stat-icon bg-primary">
                                    <i class="fa-solid fa-user-tie"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card stat-card p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted small">Khách hàng</div>
                                    <div class="fw-bold fs-5" th:text="${tongKhachHang} ?: 0">0</div>
                                </div>
                                <div class="stat-icon bg-success">
                                    <i class="fa-solid fa-users"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card stat-card p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted small">Lịch hẹn hôm nay</div>
                                    <div class="fw-bold fs-5" th:text="${lichHenHomNay} ?: 0">0</div>
                                </div>
                                <div class="stat-icon bg-warning">
                                    <i class="fa-solid fa-calendar-check"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card stat-card p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted small">Doanh thu tháng</div>
                                    <div class="fw-bold fs-5" th:text="${doanhThuThang} ?: '0 đ'">0 đ</div>
                                </div>
                                <div class="stat-icon bg-danger">
                                    <i class="fa-solid fa-sack-dollar"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
