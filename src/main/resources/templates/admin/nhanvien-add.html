<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Thêm Nhân Viên</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.card{
    border-radius:12px;
}

.card-header{
    background:#1976d2;
    color:white;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-7">

<div class="card shadow">

<div class="card-header">
<i class="fa-solid fa-user-plus"></i> Thêm Nhân Viên
</div>

<div class="card-body">

<form th:action="@{/admin/nhanvien/add}" th:object="${nhanVien}" method="post">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Họ tên</label>
<input type="text" class="form-control" th:field="*{hoTen}" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Số điện thoại</label>
<input type="text" class="form-control" th:field="*{sdt}" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Giới tính</label>
<select class="form-select" th:field="*{gioiTinh}">
<option value="">-- Chọn --</option>
<option value="Nam">Nam</option>
<option value="Nữ">Nữ</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Ngày sinh</label>
<input type="date" class="form-control" th:field="*{ngaySinh}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Chức vụ</label>
<input type="text" class="form-control" th:field="*{chucVu}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Ngày vào làm</label>
<input type="date" class="form-control" th:field="*{ngayVaoLam}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Lương cơ bản</label>
<input type="number" class="form-control" th:field="*{luongCoBan}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Ca làm</label>
<select class="form-select" th:field="*{caLam}">
<option value="">-- Chọn ca --</option>
<option th:each="ca : ${listCaLam}"
        th:value="${ca.maCa}"
        th:text="${ca.tenCa}">
</option>
</select>
</div>

</div>

<hr>

<h5 class="mb-3">
<i class="fa-solid fa-key"></i> Tài khoản đăng nhập
</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Username</label>
<input type="text" class="form-control" name="username" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Password</label>
<input type="password" class="form-control" name="password" required>
</div>

</div>

<div class="text-end mt-3">

<a href="/admin/nhanvien" class="btn btn-secondary">
<i class="fa-solid fa-arrow-left"></i> Quay lại
</a>

<button type="submit" class="btn btn-primary">
<i class="fa-solid fa-save"></i> Lưu nhân viên
</button>

</div>

</form>

</div>
</div>

</div>
</div>

</div>

</body>
</html>
