
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Quản lý dịch vụ | Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"/>

<style>

body{
background:#f4f6f9;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.navbar{
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.app-shell{
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
background:#1e3c72;
min-height:calc(100vh - 56px);
color:#cbd5e1;
}

.sidebar a{
display:flex;
align-items:center;
color:#cbd5e1;
text-decoration:none;
padding:10px 14px;
border-radius:8px;
margin-bottom:6px;
font-size:14px;
transition:all .2s ease;
}

.sidebar a i{
width:20px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.15);
color:#fff;
transform:translateX(4px);
}

.sidebar a.active{
background:#2563eb;
color:#fff;
font-weight:600;
}

/* CONTENT */

.card{
border-radius:12px;
}

.table thead{
background:#2563eb;
color:#fff;
}

.chip-time{
background:#e0edff;
color:#1d4ed8;
border-radius:999px;
padding:3px 10px;
font-size:12px;
font-weight:500;
}

.img-service{
width:80px;
height:60px;
object-fit:cover;
border-radius:6px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-light bg-white">

<div class="container-fluid px-4">

<a class="navbar-brand fw-bold text-primary" href="/admin/home">
<i class="fa-solid fa-scissors me-2"></i>BARBERSHOP ADMIN
</a>

<div class="ms-auto">

<div class="dropdown">

<a class="nav-link dropdown-toggle fw-semibold"
href="#"
role="button"
data-bs-toggle="dropdown">

<i class="fa-regular fa-user me-1"></i>Admin

</a>

<ul class="dropdown-menu dropdown-menu-end">

<li>
<a class="dropdown-item" href="/logout">
<i class="fa-solid fa-arrow-right-from-bracket me-1"></i>Đăng xuất
</a>
</li>

</ul>

</div>

</div>

</div>

</nav>


<!-- LAYOUT -->

<div class="app-shell container-fluid">

<div class="row">

<!-- SIDEBAR -->

<aside class="col-lg-2 col-md-3 sidebar p-3 d-none d-md-block">

<a href="/admin/home">
<i class="fa-solid fa-house me-2"></i>Trang chủ
</a>

<a href="/admin/nhanvien">
<i class="fa-solid fa-user-tie me-2"></i>Nhân viên
</a>

<a href="/admin/khachhang">
<i class="fa-solid fa-users me-2"></i>Khách hàng
</a>

<a href="/admin/dichvu" class="active">
<i class="fa-solid fa-spray-can-sparkles me-2"></i>Dịch vụ
</a>

<a href="/admin/lichhen">
<i class="fa-solid fa-calendar-check me-2"></i>Lịch hẹn
</a>

<a href="/admin/hoadon">
<i class="fa-solid fa-receipt me-2"></i>Hóa đơn
</a>

<a href="/admin/thongke">
<i class="fa-solid fa-chart-line me-2"></i>Doanh thu
</a>

</aside>


<!-- MAIN CONTENT -->

<main class="col-lg-10 col-md-9 py-4">

<div class="d-flex justify-content-between align-items-center mb-3">

<div>
<h4 class="mb-1">Danh sách dịch vụ</h4>
<p class="text-muted mb-0">
Quản lý bảng giá & thời lượng dịch vụ
</p>
</div>

<a class="btn btn-primary" href="/admin/dichvu/add">
<i class="fa-solid fa-plus me-2"></i>Thêm dịch vụ
</a>

</div>


<div class="card shadow-sm border-0">

<div class="card-body">

<!-- FILTER -->

<form method="get"
action="/admin/dichvu"
class="row g-2 align-items-end mb-3">

<div class="col-md-4">

<label class="form-label small text-muted">
Tìm theo tên
</label>

<input type="text"
name="keyword"
class="form-control"
th:value="${keyword}"
placeholder="Ví dụ: Cắt tóc...">

</div>

<div class="col-md-3 col-lg-2">

<label class="form-label small text-muted">
Giá từ
</label>

<input type="number"
class="form-control"
name="minPrice"
th:value="${minPrice}">

</div>

<div class="col-md-3 col-lg-2">

<label class="form-label small text-muted">
Giá đến
</label>

<input type="number"
class="form-control"
name="maxPrice"
th:value="${maxPrice}">

</div>

<div class="col-md-5 col-lg-4 text-md-end">

<button type="submit"
class="btn btn-primary me-1">

<i class="fa-solid fa-filter me-1"></i>Lọc

</button>

<a href="/admin/dichvu"
class="btn btn-outline-secondary">

<i class="fa-solid fa-xmark me-1"></i>Xóa lọc

</a>

</div>

</form>


<!-- TABLE -->

<div class="table-responsive">

<table class="table align-middle mb-0">

<thead>

<tr>

<th style="width:80px;">Mã DV</th>
<th style="width:120px;">Hình ảnh</th>
<th>Tên dịch vụ</th>
<th>Giá (VND)</th>
<th>Thời gian</th>
<th class="text-end">Thao tác</th>

</tr>

</thead>

<tbody>

<tr th:each="dv : ${listDichVu}">

<td class="fw-semibold" th:text="${dv.maDv}"></td>

<td>
<img th:src="@{'/images/dichvu/' + ${dv.hinhAnh}}" class="img-service">
</td>

<td th:text="${dv.tenDv}"></td>

<td class="fw-semibold text-primary"
th:text="${#numbers.formatDecimal(dv.gia,0,'COMMA',0,'POINT')}">
</td>

<td>

<span class="chip-time">

<i class="fa-regular fa-clock me-1"></i>

<span th:text="${dv.thoiGianThucHien}"></span> phút

</span>

</td>

<td class="text-end">

<a class="btn btn-sm btn-outline-primary me-1"
th:href="@{'/admin/dichvu/edit/' + ${dv.maDv}}">
<i class="fa-solid fa-pen-to-square"></i>
</a>

<a class="btn btn-sm btn-outline-danger"
th:href="@{'/admin/dichvu/delete/' + ${dv.maDv}}"
onclick="return confirm('Bạn có chắc muốn xóa?')">
<i class="fa-solid fa-trash-can"></i>
</a>

</td>

</tr>

<tr th:if="${#lists.isEmpty(listDichVu)}">

<td colspan="6"
class="text-center text-muted py-4">

Không có dịch vụ nào.

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</main>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
