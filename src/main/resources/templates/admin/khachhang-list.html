<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý khách hàng | Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />

    <style>
        body {
            background: #f4f6f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .navbar {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .app-shell {
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        /* ===== SIDEBAR ===== */
        .sidebar {
            background: #1e3c72;
            min-height: calc(100vh - 56px);
            color: #cbd5e1;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .sidebar a i {
            width: 20px;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateX(4px);
        }

        .sidebar a.active {
            background: #2563eb;
            color: #fff;
            font-weight: 600;
        }

        .sidebar hr {
            border-color: rgba(255,255,255,0.2);
        }

        /* ===== CONTENT ===== */
        .content-wrapper {
            padding: 24px;
        }

        .card {
            border-radius: 12px;
            border: none;
        }

        .table thead {
            background: #2563eb;
            color: #fff;
        }
    </style>
</head>

<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-primary" href="/admin/home">
                <i class="fa-solid fa-scissors me-2"></i>BARBERSHOP ADMIN
            </a>

            <div class="ms-auto dropdown">
                <a class="nav-link dropdown-toggle fw-semibold" href="#" role="button"
                    data-bs-toggle="dropdown">
                    <i class="fa-regular fa-user me-1"></i> Admin
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" href="/logout">
                            <i class="fa-solid fa-arrow-right-from-bracket me-1"></i> Đăng xuất
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ===== LAYOUT ===== -->
    <div class="app-shell container-fluid">
        <div class="row">

            <!-- ===== SIDEBAR ===== -->
            <aside class="col-lg-2 col-md-3 sidebar p-3 d-none d-md-block">

                <a href="/admin/home">
                    <i class="fa-solid fa-house me-2"></i>Trang chủ
                </a>

                <a href="/admin/nhanvien">
                    <i class="fa-solid fa-user-tie me-2"></i>Nhân viên
                </a>

                <a href="/admin/khachhang" class="active">
                    <i class="fa-solid fa-users me-2"></i>Khách hàng
                </a>

                <a href="/admin/dichvu">
                    <i class="fa-solid fa-spray-can-sparkles me-2"></i>Dịch vụ
                </a>

                <a href="/admin/lichhen">
                    <i class="fa-solid fa-calendar-check me-2"></i>Lịch hẹn
                </a>

                <a href="/admin/hoadon">
                    <i class="fa-solid fa-receipt me-2"></i>Hóa đơn
                </a>

                <a href="/admin/thongke">
                    <i class="fa-solid fa-chart-line me-2"></i>Doanh thu
                </a>

            </aside>

            <!-- ===== CONTENT ===== -->
            <main class="col-lg-10 col-md-9 content-wrapper">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="fw-semibold mb-1">Danh sách khách hàng</h4>
                        <p class="text-muted mb-0">
                            Quản lý thông tin khách hàng và lịch sử đặt lịch.
                        </p>
                    </div>

                    <a href="/admin/khachhang/add" class="btn btn-primary">
                        <i class="fa-solid fa-plus me-2"></i>Thêm khách hàng
                    </a>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">

                        <!-- SEARCH -->
                        <form method="get" action="/admin/khachhang" class="row g-2 mb-3">

                            <div class="col-md-5">
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fa-solid fa-magnifying-glass"></i>
                                    </span>
                                    <input type="text" name="keyword" th:value="${keyword}"
                                        class="form-control"
                                        placeholder="Tìm theo tên hoặc số điện thoại">
                                </div>
                            </div>

                            <div class="col-auto">
                                <button class="btn btn-primary">
                                    Tìm kiếm
                                </button>
                            </div>

                            <div class="col-auto">
                                <a href="/admin/khachhang" class="btn btn-outline-secondary">
                                    Xóa lọc
                                </a>
                            </div>

                        </form>

                        <!-- TABLE -->
                        <div class="table-responsive">
                            <table class="table align-middle table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th class="text-center">Mã KH</th>
                                        <th>Họ tên</th>
                                        <th>SĐT</th>
                                        <th class="text-center">Giới tính</th>
                                        <th class="text-center">Ngày sinh</th>
                                        <th class="text-center">Thao tác</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    <tr th:each="kh : ${listKhachHang}">
                                        <td class="text-center" th:text="${kh.makh}"></td>
                                        <td class="fw-semibold" th:text="${kh.hoTen}"></td>
                                        <td th:text="${kh.sdt}"></td>
                                        <td class="text-center" th:text="${kh.gioiTinh}"></td>
                                        <td class="text-center"
                                            th:text="${kh.ngaySinh != null ? #temporals.format(kh.ngaySinh, 'dd/MM/yyyy') : '---'}">
                                        </td>
                                        <td class="text-center">
                                            <a class="btn btn-sm btn-outline-primary me-1"
                                                th:href="@{'/admin/khachhang/edit/' + ${kh.makh}}">
                                                <i class="fa-solid fa-pen-to-square"></i>
                                            </a>
                                            <a class="btn btn-sm btn-outline-danger"
                                                th:href="@{'/admin/khachhang/delete/' + ${kh.makh}}"
                                                onclick="return confirm('Bạn chắc chắn muốn xóa?');">
                                                <i class="fa-solid fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>

                                    <tr th:if="${#lists.isEmpty(listKhachHang)}">
                                        <td colspan="6" class="text-center text-muted py-4">
                                            Không có khách hàng nào.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
