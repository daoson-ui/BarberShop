<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý hóa đơn | Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />

    <style>
        body {
            background: #f4f6fb;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .navbar {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .app-shell {
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            background: #1e3c72;
            min-height: calc(100vh - 56px);
            color: #cbd5e1;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .sidebar a i {
            width: 20px;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateX(4px);
        }

        .sidebar a.active {
            background: #2563eb;
            color: #fff;
            font-weight: 600;
        }

        .sidebar hr {
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* ===== CONTENT ===== */
        .content-wrapper {
            padding: 24px;
        }

        .card {
            border-radius: 14px;
            border: none;
        }

        .table thead {
            background: #2563eb;
            color: #fff;
        }

        .badge-method {
            background: #eafaf1;
            color: #198754;
        }
    </style>
</head>

<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-primary" href="/admin/home">
                <i class="fa-solid fa-scissors me-2"></i>BARBERSHOP ADMIN
            </a>
            <div class="ms-auto dropdown">
                <a class="nav-link dropdown-toggle fw-semibold" href="#" role="button"
                    data-bs-toggle="dropdown">
                    <i class="fa-regular fa-user me-1"></i> Admin
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" href="/logout">
                            <i class="fa-solid fa-arrow-right-from-bracket me-1"></i> Đăng xuất
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="app-shell container-fluid">
        <div class="row">

            <!-- ===== SIDEBAR ===== -->
            <aside class="col-lg-2 col-md-3 sidebar p-3 d-none d-md-block">

                <a href="/admin/home">
                    <i class="fa-solid fa-house me-2"></i>Trang chủ
                </a>

                <a href="/admin/nhanvien">
                    <i class="fa-solid fa-user-tie me-2"></i>Nhân viên
                </a>

                <a href="/admin/khachhang">
                    <i class="fa-solid fa-users me-2"></i>Khách hàng
                </a>

                <a href="/admin/dichvu">
                    <i class="fa-solid fa-spray-can-sparkles me-2"></i>Dịch vụ
                </a>

                <a href="/admin/lichhen">
                    <i class="fa-solid fa-calendar-check me-2"></i>Lịch hẹn
                </a>

                <a href="/admin/hoadon" class="active">
                    <i class="fa-solid fa-receipt me-2"></i>Hóa đơn
                </a>

                <a href="/admin/thongke">
                    <i class="fa-solid fa-chart-line me-2"></i>Doanh thu
                </a>
            </aside>

            <!-- ===== CONTENT ===== -->
            <main class="col-lg-10 col-md-9 content-wrapper">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="fw-semibold mb-1">Danh sách hóa đơn</h4>
                        <p class="text-muted mb-0">
                            Theo dõi thanh toán và doanh thu theo lịch hẹn.
                        </p>
                    </div>

                    <a class="btn btn-primary" href="/admin/hoadon/add">
                        <i class="fa-solid fa-file-circle-plus me-2"></i>Tạo hóa đơn
                    </a>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">

                        <!-- FILTER -->
                        <form method="get" action="/admin/hoadon" class="row g-3 mb-3">

                            <div class="col-md-4">
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fa-solid fa-magnifying-glass"></i>
                                    </span>
                                    <input type="text" name="keyword"
                                        th:value="${keyword}"
                                        class="form-control"
                                        placeholder="Tên khách hoặc SĐT">
                                </div>
                            </div>

                            <div class="col-md-2">
                                <input type="date" name="fromDate"
                                    th:value="${fromDate}"
                                    class="form-control">
                            </div>

                            <div class="col-md-2">
                                <input type="date" name="toDate"
                                    th:value="${toDate}"
                                    class="form-control">
                            </div>

                            <div class="col-md-2">
                                <input type="text" name="method"
                                    th:value="${method}"
                                    class="form-control"
                                    placeholder="Phương thức TT">
                            </div>

                            <div class="col-md-2 text-end">
                                <button class="btn btn-primary me-1">
                                    <i class="fa-solid fa-filter me-1"></i>Lọc
                                </button>
                                <a href="/admin/hoadon" class="btn btn-outline-secondary">
                                    Xóa lọc
                                </a>
                            </div>

                        </form>

                        <!-- TABLE -->
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th>Mã HĐ</th>
                                        <th>Ngày thanh toán</th>
                                        <th>Khách hàng</th>
                                        <th>Dịch vụ</th>
                                        <th>Tổng tiền</th>
                                        <th>Phương thức</th>
                                        <th class="text-end">Thao tác</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    <tr th:each="hd : ${listHoaDon}">
                                        <td class="fw-semibold" th:text="${hd.maHd}"></td>

                                        <td th:text="${#temporals.format(hd.ngayThanhToan, 'dd/MM/yyyy')}"></td>

                                        <td th:text="${hd.lichHen != null && hd.lichHen.khachHang != null 
                                            ? hd.lichHen.khachHang.hoTen : '---'}"></td>

                                        <td>
                                            <span th:each="dv : ${mapDichVu[hd.maHd]}">
                                                • <span th:text="${dv.dichVu.tenDv}"></span><br>
                                            </span>
                                        </td>

                                        <td class="fw-semibold text-primary"
                                            th:text="${#numbers.formatDecimal(hd.tongTien,0,'COMMA',0,'POINT')} + ' đ'">
                                        </td>

                                        <td>
                                            <span class="badge rounded-pill badge-method"
                                                th:text="${hd.phuongThucTt}"></span>
                                        </td>

                                        <td class="text-end">
                                            <a class="btn btn-sm btn-outline-primary me-1"
                                                th:href="@{'/admin/hoadon/edit/' + ${hd.maHd}}">
                                                <i class="fa-solid fa-pen-to-square"></i>
                                            </a>

                                            <a class="btn btn-sm btn-outline-secondary me-1"
                                            th:href="@{'/admin/hoadon/view/' + ${hd.maHd}}">
                                            <i class="fa-solid fa-print"></i>
                                            </a>

                                            <a class="btn btn-sm btn-outline-danger"
                                                th:href="@{'/admin/hoadon/delete/' + ${hd.maHd}}"
                                                onclick="return confirm('Xóa hóa đơn này?')">
                                                <i class="fa-solid fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>

                                    <tr th:if="${#lists.isEmpty(listHoaDon)}">
                                        <td colspan="7" class="text-center text-muted py-4">
                                            Không có hóa đơn nào phù hợp.
                                        </td>
                                    </tr>

                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
