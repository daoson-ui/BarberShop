<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Thông tin nhân viên</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background:#f4f6fb;
    font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

/* Navbar */

.navbar-brand{
    font-weight:700;
}

/* Profile card */

.profile-card{
    border:none;
    border-radius:18px;
}

.profile-avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#dee2e6;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    margin:auto;
}

.profile-info{
    font-size:16px;
}

.profile-info i{
    width:25px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark shadow-sm">
<div class="container">

<a class="navbar-brand mx-auto" href="/staff/home">

<i class="fa-solid fa-scissors me-2"></i>
King Barber Staff

</a>

</div>
</nav>

<!-- CONTENT -->

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow profile-card">

<div class="card-body p-4">

<!-- AVATAR -->

<div class="profile-avatar mb-3">
<i class="fa-solid fa-user"></i>
</div>

<h4 class="text-center mb-4">
Thông tin nhân viên
</h4>

<hr>

<!-- INFO -->

<div class="profile-info mb-3">

<p>
<i class="fa-solid fa-id-card"></i>
<strong>Họ tên:</strong>
<span th:text="${nhanVien.hoTen}">Nguyễn Văn A</span>
</p>

<p>
<i class="fa-solid fa-phone"></i>
<strong>Số điện thoại:</strong>
<span th:text="${nhanVien.sdt}">0123456789</span>
</p>

<p>
<i class="fa-solid fa-venus-mars"></i>
<strong>Giới tính:</strong>
<span th:text="${nhanVien.gioiTinh}">Nam</span>
</p>

<p>
<i class="fa-solid fa-user-tie"></i>
<strong>Chức vụ:</strong>
<span th:text="${nhanVien.chucVu}">Thợ cắt tóc</span>
</p>

</div>

<!-- BUTTONS -->

<div class="d-flex justify-content-center gap-2 mt-4">

<a href="/staff/profile/edit" class="btn btn-primary">
<i class="fa-solid fa-pen"></i>
Chỉnh sửa
</a>

<a href="/staff/home" class="btn btn-secondary">

<i class="fa-solid fa-arrow-left"></i>
Quay lại

</a>

</div>

</div>
</div>
</div>
</div>
</div>

</body>
</html>
