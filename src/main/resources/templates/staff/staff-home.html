<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Staff Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background:#f4f6fb;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

/* Navbar */

.navbar-brand{
    font-weight:700;
    letter-spacing:1px;
}

/* Title */

.page-title{
    font-weight:700;
    color:#333;
}

/* Card dashboard */

.dashboard-card{
    border:none;
    border-radius:16px;
    transition:all 0.3s ease;
}

.dashboard-card:hover{
    transform:translateY(-6px);
    box-shadow:0 12px 28px rgba(0,0,0,0.15);
}

/* Icon */

.card-icon{
    font-size:40px;
}

/* number */

.stat-number{
    font-size:36px;
    font-weight:700;
}

/* quick actions */

.action-card{
    border-radius:16px;
    transition:0.25s;
    border:none;
}

.action-card:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* section spacing */

.section-title{
    font-weight:600;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

<div class="container">

<a class="navbar-brand mx-auto"
   href="/staff/home">

<i class="fa-solid fa-scissors me-2"></i>
King Barber Staff

</a>

</div>

</nav>

<div class="container mt-5">

<!-- PAGE TITLE -->

<h3 class="page-title text-center mb-5">

<i class="fa-solid fa-scissors me-2"></i>
Chào mừng bạn quay trở lại!

</h3>

<!-- STATISTICS -->

<div class="row g-4 justify-content-center">

<!-- WAITING -->

<div class="col-md-5">

<div class="card dashboard-card shadow bg-warning text-dark">

<div class="card-body text-center p-4">

<div class="card-icon mb-3">
<i class="fa-solid fa-hourglass-half"></i>
</div>

<h5>Lịch hẹn đang chờ</h5>

<div class="stat-number mt-2"
     th:text="${waitingAppointments}">
0
</div>

</div>

</div>

</div>

<!-- DONE -->

<div class="col-md-5">

<div class="card dashboard-card shadow bg-success text-white">

<div class="card-body text-center p-4">

<div class="card-icon mb-3">
<i class="fa-solid fa-circle-check"></i>
</div>

<h5>Lịch hẹn đã hoàn thành</h5>

<div class="stat-number mt-2"
     th:text="${doneAppointments}">
0
</div>

</div>

</div>

</div>

</div>

<!-- QUICK ACTIONS -->

<hr class="mt-5 mb-4">

<h5 class="section-title mb-4 text-center">
Chức năng nhanh
</h5>

<div class="row g-4">

<!-- APPOINTMENTS -->

<div class="col-md-4">

<a href="/staff/appointments" class="text-decoration-none text-dark">

<div class="card action-card shadow text-center">

<div class="card-body p-4">

<i class="fa-solid fa-calendar-check fa-2x mb-3 text-primary"></i>

<h6 class="fw-bold">Xem lịch của tôi</h6>

<p class="text-muted small mb-0">
Danh sách lịch hẹn được phân công
</p>

</div>

</div>

</a>

</div>

<!-- PROFILE -->

<div class="col-md-4">

<a href="/staff/profile" class="text-decoration-none text-dark">

<div class="card action-card shadow text-center">

<div class="card-body p-4">

<i class="fa-solid fa-user fa-2x mb-3 text-info"></i>

<h6 class="fw-bold">Thông tin cá nhân</h6>

<p class="text-muted small mb-0">
Xem thông tin nhân viên
</p>

</div>

</div>

</a>

</div>

<!-- LOGOUT -->

<div class="col-md-4">

<a href="/logout" class="text-decoration-none text-dark">

<div class="card action-card shadow text-center">

<div class="card-body p-4">

<i class="fa-solid fa-right-from-bracket fa-2x mb-3 text-danger"></i>

<h6 class="fw-bold">Đăng xuất</h6>

<p class="text-muted small mb-0">
Thoát khỏi hệ thống
</p>

</div>

</div>

</a>

</div>

</div>

</div>

</body>
</html>
