<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Lịch của tôi | Staff</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"/>

<style>

body{
    background:#f4f6fb;
}

.table{
    background:white;
}

.page-title{
    font-weight:700;
}

.badge{
    font-size:13px;
}

</style>

</head>

<body>

<div class="container mt-4">

<h3 class="page-title mb-4">

<i class="fa-solid fa-calendar-days me-2"></i>
Lịch hẹn của tôi

</h3>
<form method="get" action="/staff/appointments" class="row g-3 mb-4">

<div class="col-md-4">

<input type="text"
name="keyword"
class="form-control"
placeholder="Tên khách hàng"
th:value="${keyword}">

</div>

<div class="col-md-3">

<input type="date"
name="ngayHen"
class="form-control"
th:value="${ngayHen}">

</div>

<div class="col-md-3">

<select name="trangThai" class="form-select">

<option value="">-- Trạng thái --</option>

<option value="Chờ"
th:selected="${trangThai=='Chờ'}">
Chờ
</option>

<option value="Đang làm"
th:selected="${trangThai=='Đang làm'}">
Đang làm
</option>

<option value="Hoàn thành"
th:selected="${trangThai=='Hoàn thành'}">
Hoàn thành
</option>

</select>

</div>

<div class="col-md-2 d-flex gap-2">

<button class="btn btn-primary flex-fill">
<i class="fa fa-search"></i> Lọc
</button>

<a href="/staff/appointments" class="btn btn-secondary flex-fill">
<i class="fa fa-rotate-left"></i> Xóa lọc
</a>

</div>

</form>
<table class="table table-bordered table-hover align-middle">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Khách hàng</th>
<th>Ngày</th>
<th>Giờ</th>
<th>Trạng thái</th>
<th width="160">Cập nhật</th>
</tr>

</thead>

<tbody>

<tr th:each="lh : ${listLichHen}">

<td th:text="${lh.maLh}"></td>

<td th:text="${lh.khachHang.hoTen}"></td>

<td th:text="${#temporals.format(lh.ngayHen, 'dd/MM/yyyy')}"></td>

<td th:text="${lh.gioHen}"></td>

<td>

<span class="badge bg-warning"
th:if="${lh.trangThai=='Chờ'}">
Chờ
</span>

<span class="badge bg-primary"
th:if="${lh.trangThai=='Đang làm'}">
Đang làm
</span>

<span class="badge bg-success"
th:if="${lh.trangThai=='Hoàn thành'}">
Hoàn thành
</span>

</td>

<td>

<!-- CHỜ -> BẮT ĐẦU LÀM -->

<form th:if="${lh.trangThai=='Chờ'}"
th:action="@{/staff/update-status/{id}(id=${lh.maLh})}"
method="post"
style="display:inline">

<input type="hidden" name="status" value="Đang làm"/>

<button class="btn btn-sm btn-primary">

<i class="fa-solid fa-play"></i>
Bắt đầu

</button>

</form>

<!-- ĐANG LÀM -> HOÀN THÀNH -->

<form th:if="${lh.trangThai=='Đang làm'}"
th:action="@{/staff/update-status/{id}(id=${lh.maLh})}"
method="post"
style="display:inline">

<input type="hidden" name="status" value="Hoàn thành"/>

<button class="btn btn-sm btn-success">

<i class="fa-solid fa-check"></i>
Hoàn thành

</button>

</form>

</td>

</tr>

<tr th:if="${#lists.isEmpty(listLichHen)}">

<td colspan="6" class="text-center text-muted">

Không có lịch hẹn nào

</td>

</tr>

</tbody>

</table>

<a href="/staff/home" class="btn btn-secondary">

<i class="fa-solid fa-arrow-left"></i>
Quay lại Dashboard

</a>

</div>

</body>
</html>
